<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Eligibility Checker</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI', sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#667eea,#764ba2);
    }

    .container{
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(10px);
        padding:35px;
        border-radius:20px;
        text-align:center;
        width:350px;
        box-shadow:0 8px 32px rgba(0,0,0,0.2);
        color:white;
    }

    h2{
        margin-bottom:20px;
        font-size:28px;
    }

    input{
        width:100%;
        padding:12px;
        border:none;
        outline:none;
        border-radius:10px;
        margin-bottom:15px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#ffffff;
        color:#764ba2;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        transform:translateY(-3px);
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    #result{
        margin-top:20px;
        font-size:18px;
        font-weight:bold;
    }

    .eligible{
        color:#7CFF7C;
    }

    .notEligible{
        color:#FF9A9A;
    }
</style>

</head>
<body>

<div class="container">
    <h2>🎂 Age Eligibility</h2>

    <input type="number" id="age" placeholder="Enter your age">

    <button onclick="checkAge()">Check Eligibility</button>

    <p id="result"></p>
</div>

<script>
    function checkAge() {
        let age = document.getElementById("age").value;
        let result = document.getElementById("result");

        if(age === ""){
            result.innerHTML = "⚠ Please enter your age";
            result.className = "notEligible";
        }
        else if(age >= 18){
            result.innerHTML = "✅ You are eligible";
            result.className = "eligible";
            console.log("You are eligible.");
        }
        else{
            result.innerHTML = "❌ You are not eligible";
            result.className = "notEligible";
            console.log("You are not eligible.");
        }
    }
</script>

</body>
</html>
