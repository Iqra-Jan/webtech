<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#667eea,#764ba2);
    }

    .calendar{
        width:420px;
        background:white;
        border-radius:15px;
        overflow:hidden;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    .month{
        background:#4f46e5;
        color:white;
        text-align:center;
        padding:20px;
        font-size:24px;
        font-weight:bold;
    }

    .days,
    .dates{
        display:grid;
        grid-template-columns:repeat(7,1fr);
        text-align:center;
    }

    .days div{
        background:#eef2ff;
        padding:15px;
        font-weight:bold;
        color:#333;
    }

    .dates div{
        padding:18px;
        border:1px solid #eee;
        transition:0.3s;
    }

    .dates div:hover{
        background:#c7d2fe;
        cursor:pointer;
    }

    .today{
        background:#4f46e5;
        color:white;
        border-radius:50%;
        width:35px;
        height:35px;
        margin:auto;
        display:flex;
        align-items:center;
        justify-content:center;
    }
</style>
</head>
<body>

<div class="calendar">

    <div class="month">
        May 2026
    </div>

    <div class="days">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
    </div>

    <div class="dates">
        <div></div>
        <div>1</div>
        <div>2</div>
        <div><span class="today">3</span></div>
        <div>4</div>
        <div>5</div>
        <div>6</div>

        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
        <div>11</div>
        <div>12</div>
        <div>13</div>

        <div>14</div>
        <div>15</div>
        <div>16</div>
        <div>17</div>
        <div>18</div>
        <div>19</div>
        <div>20</div>

        <div>21</div>
        <div>22</div>
        <div>23</div>
        <div>24</div>
        <div>25</div>
        <div>26</div>
        <div>27</div>

        <div>28</div>
        <div>29</div>
        <div>30</div>
    </div>

</div>

</body>
</html>
