<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#4facfe,#00f2fe);
        font-family:Arial, sans-serif;
    }

    .card{
        width:300px;
        background:white;
        border-radius:15px;
        text-align:center;
        padding:20px;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
        transition:0.4s;
    }

    .card:hover{
        transform:translateY(-10px);
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .profile-pic{
        width:120px;
        height:120px;
        border-radius:50%;
        margin:auto;
        background:#ddd;
        overflow:hidden;
    }

    .profile-pic img{
        width:100%;
        height:100%;
    }

    h2{
        margin-top:15px;
        color:#333;
    }

    p{
        color:gray;
    }

    .btn{
        display:inline-block;
        margin-top:15px;
        padding:10px 20px;
        background:#4facfe;
        color:white;
        text-decoration:none;
        border-radius:5px;
        transition:0.3s;
    }

    .btn:hover{
        background:#007bff;
        letter-spacing:2px;
    }
</style>
</head>
<body>

<div class="card">
    <div class="profile-pic">
        <img src="https://via.placeholder.com" alt="Profile">
    </div>

    <h2>Iqra Jan</h2>
    <p>Computer Science Student</p>

    <a href="#" class="btn">Follow</a>
</div>

</body>
</html>
