<!DOCTYPE html>
<html>
<head>
    <title>Age Eligibility Checker</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        button {
            background: #2575fc;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1a5ed8;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Age Eligibility Checker</h2>
    <button onclick="checkAge()">Check Eligibility</button>
</div>

<script>
    function checkAge() {
        let age = prompt("Enter your age:");

        if (age >= 18) {
            alert("✅ You are eligible.");
        } else {
            alert("❌ You are not eligible.");
        }
    }
</script>

</body>
</html>
